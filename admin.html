<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Stage Display</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eee; }
        .card { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .row { margin-bottom: 10px; }
        label { display: block; font-size: 0.8rem; color: #666; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        .btn-update { background: #00ffcc; }
        .btn-next { background: #ffcc00; }
    </style>
</head>
<body>

<div class="card">
    <h3 style="margin-top:0">Current Event</h3>
    <div class="row"><label>Event Name</label><input type="text" id="e"></div>
    <div class="row"><label>Round #</label><input type="text" id="r"></div>
    <div class="row"><label>Group</label><input type="text" id="g"></div>
    
    <button class="btn-next" onclick="cycleGroup()">NEXT GROUP</button>
    <hr>
    <h3>Up Next</h3>
    <div class="row"><label>Event Name</label><input type="text" id="n"></div>
    <div class="row"><label>Round #</label><input type="text" id="nr"></div>
    <div class="row"><label>Group</label><input type="text" id="ng"></div>
    
    <div class="row">
        <label>Silence Mode</label>
        <select id="s"><option value="false">Off</option><option value="true">On</option></select>
    </div>
    
    <button class="btn-update" onclick="save()">PUSH FULL UPDATE</button>
</div>

<script>
    function load() {
        const data = JSON.parse(localStorage.getItem('falkirkSettings') || '{}');
        if (data.event) {
            document.getElementById('e').value = data.event;
            document.getElementById('r').value = data.round;
            document.getElementById('g').value = data.group;
            document.getElementById('n').value = data.next;
            document.getElementById('nr').value = data.nextRound;
            document.getElementById('ng').value = data.nextGroup;
            document.getElementById('s').value = data.isSilent;
        }
    }

    function cycleGroup() {
        document.getElementById('g').value = document.getElementById('ng').value;
        save();
    }

    function save() {
        const data = {
            event: document.getElementById('e').value,
            round: document.getElementById('r').value,
            group: document.getElementById('g').value,
            next: document.getElementById('n').value,
            nextRound: document.getElementById('nr').value,
            nextGroup: document.getElementById('ng').value,
            isSilent: document.getElementById('s').value
        };
        localStorage.setItem('falkirkSettings', JSON.stringify(data));
    }
    window.onload = load;
</script>
</body>
</html>
