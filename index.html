<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Comp Stage Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-main: #00ffcc;
            --text-sub: #ffcc00;
            --accent-gray: #222;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.4s;
            overflow: hidden;
        }

        body.silence { background-color: #400; }
        
        #silence-banner { 
            display: none; 
            background: #ff0; 
            color: #000; 
            font-family: 'Bebas Neue', cursive;
            font-size: 3rem; 
            padding: 15px; 
            text-align: center;
            letter-spacing: 4px;
        }

        .container {
            display: flex;
            flex: 1;
            padding: 60px;
            gap: 60px;
        }

        .current-side {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 2px solid var(--accent-gray);
        }

        .next-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 20px;
        }

        .label { 
            font-family: 'Bebas Neue', cursive;
            font-size: 2.2rem; 
            color: #777; 
            letter-spacing: 2px; 
        }

        .event-text { 
            font-size: 7rem; 
            color: var(--text-main); 
            margin: 0 0 10px 0;
            line-height: 1;
        }

        .round-text {
            font-size: 3rem;
            color: #fff;
            margin-bottom: 30px;
        }

        .group-text { 
            font-size: 6rem; 
            color: var(--text-sub); 
            margin: 0;
        }

        .next-event-text { 
            font-size: 3.5rem; 
            color: #fff; 
            margin: 10px 0 20px 0; 
            line-height: 1.1;
        }

        .next-group-text { 
            font-size: 3rem; 
            color: var(--text-sub); 
        }
    </style>
</head>
<body>

    <div id="silence-banner">⚠️ ABSOLUTE SILENCE IN PROGRESS ⚠️</div>

    <div class="container">
        <div class="current-side">
            <div class="label">NOW COMPETING</div>
            <div id="cur-event" class="event-text">--</div>
            <div id="cur-round" class="round-text">--</div>
            
            <div class="label">GROUP</div>
            <div id="cur-group" class="group-text">--</div>
        </div>

        <div class="next-side">
            <div class="label">UP NEXT</div>
            <div id="next-event" class="next-event-text">--</div>
            <div id="next-round" class="round-text" style="font-size: 2rem;">--</div>
            
            <div class="label">NEXT GROUP</div>
            <div id="next-group" class="next-group-text">--</div>
        </div>
    </div>

    <script>
        function update() {
            const data = JSON.parse(localStorage.getItem('falkirkSettings') || '{}');
            document.getElementById('cur-event').innerText = data.event || "OFFLINE";
            document.getElementById('cur-round').innerText = data.round || "";
            document.getElementById('cur-group').innerText = data.group || "--";
            
            document.getElementById('next-event').innerText = data.next || "--";
            document.getElementById('next-round').innerText = data.nextRound || "";
            document.getElementById('next-group').innerText = data.nextGroup || "--";

            if (data.isSilent === "true") {
                document.body.classList.add('silence');
                document.getElementById('silence-banner').style.display = "block";
            } else {
                document.body.classList.remove('silence');
                document.getElementById('silence-banner').style.display = "none";
            }
        }
        setInterval(update, 1000);
        window.onload = update;
    </script>
</body>
</html>
