<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Comp Stage Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-main: #00ffcc;
            --text-sub: #ffcc00;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.4s;
        }

        body.silence { background-color: #300; }

        /* Flashing Live Dot & Comp ID Input */
        #status-bar {
            position: absolute;
            top: 30px;
            left: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Bebas Neue', cursive;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: #555;
        }
        
        #api-controls {
            position: absolute;
            top: 30px;
            right: 30px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .comp-input {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #00ffcc;
            font-family: 'Bebas Neue';
            padding: 5px 10px;
            border-radius: 4px;
            outline: none;
        }

        .dot {
            height: 12px;
            width: 12px;
            background-color: #f00;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; box-shadow: 0 0 0 0px rgba(255, 0, 0, 0.7); }
            70% { opacity: 0.3; box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
            100% { opacity: 1; }
        }

        /* Center Content */
        .main-display {
            text-align: center;
            width: 90%;
        }
        .label { 
            font-family: 'Bebas Neue', cursive;
            font-size: 2.5rem; 
            color: #666; 
            letter-spacing: 5px;
            margin-bottom: 10px;
        }
        .event-title { 
            font-size: 12rem; 
            line-height: 0.9;
            margin: 0;
            color: var(--text-main);
            font-weight: 400;
        }
        .round-info {
            font-size: 4rem;
            color: #fff;
            margin: 20px 0;
        }
        .group-info {
            font-size: 8rem;
            color: var(--text-sub);
            margin: 0;
        }

        /* Bottom Ticker */
        .bottom-ticker {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: #1a1a1a;
            padding: 20px 0;
            display: flex;
            justify-content: center;
            gap: 50px;
            border-top: 1px solid #333;
        }
        .ticker-item {
            font-size: 1.8rem;
            display: flex;
            gap: 15px;
        }
        .ticker-label { color: #666; font-family: 'Bebas Neue'; }
        .ticker-value { color: #fff; }

        /* Silence Banner */
        #silence-banner {
            display: none;
            position: absolute;
            top: 80px;
            background: yellow;
            color: black;
            padding: 5px 30px;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 50px;
            font-family: 'Montserrat';
        }
    </style>
</head>
<body>

    <div id="status-bar"><span class="dot"></span> LIVE COMP SYSTEM</div>
    
    <div id="api-controls">
        <input type="text" id="compId" class="comp-input" placeholder="WCA COMP ID" onchange="saveCompId()">
    </div>

    <div id="silence-banner">SHHH! SILENCE REQUIRED</div>

    <div class="main-display">
        <div class="label">CURRENTLY COMPETING</div>
        <div id="cur-event" class="event-title">--</div>
        <div class="label" style="margin-top: 40px;">ROUND</div>
        <div id="cur-round" class="round-info">--</div>
        <div class="label" style="margin-top: 40px;">GROUP</div>
        <div id="cur-group" class="group-info">--</div>
    </div>

    <div class="bottom-ticker">
        <div class="ticker-item">
            <span class="ticker-label">UP NEXT:</span>
            <span id="next-event" class="ticker-value">--</span>
        </div>
        <div class="ticker-item">
            <span class="ticker-label">ROUND:</span>
            <span id="next-round" class="ticker-value">--</span>
        </div>
        <div class="ticker-item">
            <span class="ticker-label">GROUP:</span>
            <span id="next-group" class="ticker-value">--</span>
        </div>
    </div>

    <script>
        let wcaSchedule = [];

        // Save Comp ID to local storage so it persists
        function saveCompId() {
            const id = document.getElementById('compId').value;
            localStorage.setItem('falkirk_wca_id', id);
            fetchWCA();
        }

        async function fetchWCA() {
            let id = document.getElementById('compId').value.trim();
            if (!id) return;
        
            // Optional: You can try to force it to a specific format if you know 
            // you'll always use a certain one, but usually, it's better to just
            // remind yourself to check the URL of the WCA page.
            
            try {
                const response = await fetch(`https://www.worldcubeassociation.org/api/v0/competitions/${id}/wcif/public`);
                
                if (!response.ok) {
                    console.error("Comp not found. check caps!");
                    document.getElementById('status-bar').innerText = "❌ ID NOT FOUND (CHECK CAPS)";
                    return;
                }
        
                const data = await response.json();
                document.getElementById('status-bar').innerHTML = '<span class="dot"></span> LIVE COMP SYSTEM';
                wcaSchedule = data.schedule.venues[0].rooms[0].activities;
                console.log("Schedule Loaded:", wcaSchedule);
                update(); // Run update immediately after fetch
            } catch (e) {
                console.error("WCA Fetch Error", e);
            }
        }
        
        function update() {
            // 1. Check for manual admin override first
            const manualData = JSON.parse(localStorage.getItem('falkirkSettings') || '{}');
            const now = new Date();
            
            let displayData = {
                event: manualData.event || "STANDBY",
                round: manualData.round || "",
                group: manualData.group || "--",
                next: manualData.next || "--",
                nextRound: manualData.nextRound || "",
                nextGroup: manualData.nextGroup || "--",
                isSilent: manualData.isSilent === "true"
            };

            // 2. If no manual event is set, or if we want to prioritize API, check schedule
            // Only uses API if manual event is "STANDBY" or empty
            if (wcaSchedule.length > 0 && (manualData.event === "STANDBY" || !manualData.event)) {
                const currentAct = wcaSchedule.find(act => {
                    const start = new Date(act.startTime);
                    const end = new Date(act.endTime);
                    return now >= start && now <= end;
                });

                const nextAct = wcaSchedule.find(act => new Date(act.startTime) > now);

                if (currentAct) {
                    displayData.event = currentAct.name.split(',')[0]; // Clean up name
                    displayData.round = ""; // API round info is usually in the name
                    displayData.group = "API SYNC";
                    // Auto-Silence if activity code contains 'bf'
                    if (currentAct.activityCode.includes('bf')) displayData.isSilent = true;
                }

                if (nextAct) {
                    displayData.next = nextAct.name;
                }
            }

            // 3. Render to Screen
            document.getElementById('cur-event').innerText = displayData.event;
            document.getElementById('cur-round').innerText = displayData.round ? "Round " + displayData.round : "";
            document.getElementById('cur-group').innerText = displayData.group;
            
            document.getElementById('next-event').innerText = displayData.next;
            document.getElementById('next-round').innerText = displayData.nextRound ? "Round " + displayData.nextRound : "";
            document.getElementById('next-group').innerText = displayData.nextGroup;

            if (displayData.isSilent) {
                document.body.classList.add('silence');
                document.getElementById('silence-banner').style.display = "block";
            } else {
                document.body.classList.remove('silence');
                document.getElementById('silence-banner').style.display = "none";
            }
        }

        // Double Click for Fullscreen
        document.addEventListener('dblclick', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        window.onload = () => {
            const savedId = localStorage.getItem('falkirk_wca_id');
            if (savedId) {
                document.getElementById('compId').value = savedId;
                fetchWCA();
            }
            update();
        };

        setInterval(update, 1000);
        setInterval(fetchWCA, 60000); // Re-sync with WCA every minute
    </script>
</body>
</html>
